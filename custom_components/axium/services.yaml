set_alarm:
  name: Set alarm
  description: >-
    Add or update a wake-to-music alarm by name. Any field left out keeps its
    current value (or a default for a new alarm).
  fields:
    hub:
      name: Amplifier
      description: Config entry id of the amplifier (only needed with more than one).
      required: false
      selector:
        text:
    name:
      name: Name
      description: Alarm name (the key; reusing a name edits that alarm).
      required: true
      selector:
        text:
    time:
      name: Time
      description: Time of day (HH:MM).
      required: false
      selector:
        time:
    days:
      name: Days
      description: Weekdays to run on (0=Mon .. 6=Sun); empty means every day.
      required: false
      selector:
        select:
          multiple: true
          options:
            - { value: "0", label: Monday }
            - { value: "1", label: Tuesday }
            - { value: "2", label: Wednesday }
            - { value: "3", label: Thursday }
            - { value: "4", label: Friday }
            - { value: "5", label: Saturday }
            - { value: "6", label: Sunday }
    zones:
      name: Zones
      description: Zone media_player entities to wake.
      required: false
      selector:
        entity:
          integration: axium
          domain: media_player
          multiple: true
    source:
      name: Source
      description: Source id (protocol byte) to play.
      required: false
      selector:
        number:
          min: 0
          max: 63
          mode: box
    volume:
      name: Target volume
      description: Volume to fade up to (percent).
      required: false
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
    enabled:
      name: Enabled
      description: Whether the alarm is armed.
      required: false
      selector:
        boolean:

remove_alarm:
  name: Remove alarm
  description: Delete a wake-to-music alarm by name.
  fields:
    hub:
      name: Amplifier
      description: Config entry id of the amplifier (only needed with more than one).
      required: false
      selector:
        text:
    name:
      name: Name
      description: Name of the alarm to remove.
      required: true
      selector:
        text:

play_notification:
  name: Play notification
  description: >-
    Play a sound on selected zones, then restore exactly what they were doing
    (source, volume, mute — or off). The amp can't mix audio, so this overrides
    the source for the duration; give it a louder notification volume to be
    heard over quieter content. By default the sound is pushed straight to each
    zone's built-in amp renderer (works on every zone, no DLNA discovery needed),
    so the amp must be able to reach Home Assistant on your main LAN. Set a
    Renderer only to route through a specific media_player instead.
  fields:
    hub:
      name: Amplifier
      description: Config entry id of the amplifier (only needed with more than one).
      required: false
      selector:
        text:
    zones:
      name: Zones
      description: Zone media_player entities to announce on.
      required: false
      selector:
        entity:
          integration: axium
          domain: media_player
          multiple: true
    presets:
      name: Presets
      description: Zone-preset names whose zones to announce on (added to Zones).
      required: false
      selector:
        select:
          multiple: true
          custom_value: true
          options: []
    volume:
      name: Notification volume
      description: Volume for the notification (percent). Left out = keep current.
      required: false
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
    media_player:
      name: Renderer (optional override)
      description: >-
        Leave empty to push the sound directly to each zone's amp renderer.
        Set a media_player (a specific DLNA renderer or Music Assistant player)
        only to route the sound through it instead.
      required: false
      selector:
        entity:
          domain: media_player
    message:
      name: Spoken message
      description: >-
        Text to speak (text-to-speech). Takes precedence over Sound. Uses the
        first TTS engine unless you set one below.
      required: false
      example: The washing machine is done
      selector:
        text:
    tts_engine:
      name: TTS engine
      description: TTS engine entity for the spoken message (default: the first one).
      required: false
      selector:
        entity:
          domain: tts
    language:
      name: Language
      description: >-
        Language for the spoken message (e.g. "nl"), overriding the engine
        default. Handy with Google Translate.
      required: false
      selector:
        text:
    media_content_id:
      name: Sound
      description: >-
        Media content id / URL of the sound (a chime or a media-source id).
        Home Assistant serves it to the amp, so any HA-reachable media works.
        Ignored if a spoken Message is given.
      required: false
      selector:
        text:
    media_content_type:
      name: Media content type
      description: Content type for the sound (default "music").
      required: false
      selector:
        text:
    source:
      name: Source
      description: >-
        Source id (protocol byte) that carries the notification. Defaults to the
        detected internal Media Player; set this if the sound comes from an
        external input instead.
      required: false
      selector:
        number:
          min: 0
          max: 63
          mode: box
    duration:
      name: Duration
      description: >-
        Seconds to hold the notification before restoring. Left out: wait for the
        renderer to finish (or ~5s if no renderer is given).
      required: false
      selector:
        number:
          min: 0
          max: 300
          unit_of_measurement: s
